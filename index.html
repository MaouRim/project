<!DOCTYPE html>
<html>
<head>
<title>System Analysis</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
padding:40px;
}

#terminal{
margin-top:20px;
line-height:1.6;
}

.progress{
width:100%;
background:#111;
border:1px solid #00ff00;
margin-top:20px;
}

.bar{
width:0%;
height:20px;
background:#00ff00;
}

</style>

</head>

<body>

<div id="info"></div>
<div id="terminal"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<script>

async function getIP(){
let res = await fetch("https://api.ipify.org?format=json");
let data = await res.json();
return data.ip;
}

async function start(){

let ip = await getIP();
let device = navigator.userAgent;

document.getElementById("info").innerHTML =
"IP Detected: "+ip+"<br>Device: "+device+"<br><br>";

let steps=[
"Initializing system interface...",
"Scanning network ports...",
"Analyzing device fingerprint...",
"Checking breach databases...",
"Running packet inspection...",
"Simulating brute force test...",
"Checking system vulnerabilities...",
"System hacked succesfull..."

];

let i=0;
let terminal=document.getElementById("terminal");

function typeLine(){
if(i<steps.length){
terminal.innerHTML += steps[i]+"<br>";
i++;
setTimeout(typeLine,1500);
}else{
terminal.innerHTML += "<br>Scan Complete<br>";
terminal.innerHTML += "⚠️ Security awareness demo.<br>";
terminal.innerHTML += "Always verify links before clicking.";
}
}

typeLine();

let width=0;
let bar=document.getElementById("bar");

let progress=setInterval(function(){

if(width>=100){
clearInterval(progress);
}else{
width++;
bar.style.width=width+"%";
}

},80);

}

window.onload=start;

</script>

</body>
</html>
