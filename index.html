<!DOCTYPE html>
<html>
<head>
<title>System Breach Detected</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    color:#00ff00;
    font-family:monospace;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

.popup{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    border:2px solid #00ff00;
    padding:20px;
    font-size:20px;
    text-align:center;
    animation: blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="popup">
⚠ SYSTEM BREACH DETECTED ⚠<br><br>
Accessing contacts...<br>
Uploading data...<br>
IP Logged.
</div>

<script>

var canvas = document.getElementById("matrix");
var ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

var letters = "01HACKEDSYSTEMACCESSGRANTED";
letters = letters.split("");

var fontSize = 14;
var columns = canvas.width/fontSize;

var drops = [];
for(var x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#0F0";
ctx.font = fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
drops[i] = 0;

drops[i]++;
}

}

setInterval(draw,33);

setTimeout(()=>{
alert("Remote access established.");
},3000);

setTimeout(()=>{
alert("Downloading gallery images...");
},6000);

setTimeout(()=>{
alert("Device control enabled.");
},9000);

</script>

</body>
</html>
