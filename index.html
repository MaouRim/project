<!DOCTYPE html>
<html>
<head>
<title>System Interface</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
padding:30px;
overflow:hidden;
}

#terminal{
white-space:pre-line;
line-height:1.5;
}

.progress{
width:100%;
background:#111;
border:1px solid #00ff00;
margin-top:20px;
}

.bar{
height:20px;
width:0%;
background:#00ff00;
}

.popup{
position:fixed;
background:#111;
border:2px solid red;
color:red;
padding:15px;
font-weight:bold;
display:none;
}

#popup1{top:20px;right:20px;}
#popup2{bottom:20px;left:20px;}

</style>
</head>

<body>

<div id="popup1" class="popup">⚠ Suspicious network activity detected</div>
<div id="popup2" class="popup">⚠ Running security diagnostics</div>

<div id="info"></div>
<div id="terminal"></div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<script>

async function getIP(){
let r = await fetch("https://api.ipify.org?format=json");
let d = await r.json();
return d.ip;
}

async function start(){

let ip = await getIP();
let device = navigator.userAgent;

document.getElementById("info").innerHTML =
"IP: "+ip+"<br>Device: "+device+"\n\n";

let lines=[
"> initializing system interface",
"> connecting to remote node",
"> scanning open ports",
"> analyzing device fingerprint",
"> searching breach databases",
"> running packet inspection",
"> simulating brute force check",
"> decrypting hash tables",
"> compiling security report",
"> process complete"
];

let term=document.getElementById("terminal");
let i=0;

function type(){
if(i<lines.length){
term.innerHTML += lines[i]+"\n";
i++;
setTimeout(type,1200);
}
else{
term.innerHTML += "\n[simulation finished]\n";
term.innerHTML += "Security awareness demo.";
}
}

type();

let width=0;
let bar=document.getElementById("bar");

let p=setInterval(()=>{
if(width>=100){
clearInterval(p);
}else{
width++;
bar.style.width=width+"%";
}
},60);

setTimeout(()=>{
document.getElementById("popup1").style.display="block";
},3000);

setTimeout(()=>{
document.getElementById("popup2").style.display="block";
},6000);

}

window.onload=start;

</script>

</body>
</html>
